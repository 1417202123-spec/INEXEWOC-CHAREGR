<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | USA Laptop Chargers</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <div class="logo"><h2>USA Laptop Chargers</h2></div>
            <nav class="nav-links">
                <a href="index.html">Home</a><a href="products.html">Products</a><a href="about.html">About Us</a><a href="contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>

    <section class="page-header"><div class="container"><h1>Contact Us</h1></div></section>

    <section class="contact-form">
        <div class="container">
            <h2>Send Us a Message</h2>
            <!-- 替换为你的商务邮箱 -->
            <form action="mailto:yourbusiness@email.com" method="GET" enctype="text/plain">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Your Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>

            <div class="contact-info">
                <h3>Direct Contact</h3>
                <p>Email: support@usalaptopchargers.com</p>
                <p>Shipping: USA Warehouse Fast Delivery</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-links"><a href="index.html">Home</a><a href="products.html">Products</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
            <p>© 2025 USA Laptop Chargers. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
